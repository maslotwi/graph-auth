basePath: /
definitions:
  api.AuthorizeRequest:
    properties:
      client_id:
        type: string
      redirect_uri:
        type: string
      scope:
        type: string
      state:
        type: string
    type: object
  api.AuthorizeResponse:
    properties:
      redirect_to:
        type: string
      status:
        example: success
        type: string
    type: object
  api.ConsumeDelegationCodeRequest:
    properties:
      code:
        type: string
      device_name:
        type: string
      scopes:
        items:
          type: string
        type: array
    type: object
  api.ConsumeDelegationCodeResponse:
    properties:
      scopes:
        items:
          type: string
        type: array
      session_token:
        type: string
      status:
        example: authenticated
        type: string
    type: object
  api.CreateClientRequest:
    properties:
      name:
        type: string
    type: object
  api.CreateClientResponse:
    properties:
      client_id:
        type: string
      client_secret:
        type: string
      name:
        type: string
    type: object
  api.ErrorResponse:
    properties:
      error:
        example: invalid_request
        type: string
    type: object
  api.GenerateDelegationCodeResponse:
    properties:
      code:
        type: string
      expires_in:
        type: integer
      link:
        type: string
    type: object
  api.HealthResponse:
    properties:
      status:
        example: ok
        type: string
    type: object
  api.RegisterRequest:
    properties:
      email:
        type: string
    type: object
  api.RegisterResponse:
    properties:
      message:
        example: Check your email for a verification link.
        type: string
    type: object
  api.TokenExchangeRequest:
    properties:
      client_id:
        type: string
      client_secret:
        type: string
      code:
        type: string
      grant_type:
        type: string
      redirect_uri:
        type: string
    type: object
  api.TokenExchangeResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      scopes:
        items:
          type: string
        type: array
      token_type:
        example: Bearer
        type: string
    type: object
  api.VerifyRequest:
    properties:
      name:
        type: string
      scopes:
        items:
          type: string
        type: array
      token:
        type: string
    type: object
  api.VerifyResponse:
    properties:
      email:
        type: string
      sessionToken:
        type: string
    type: object
info:
  contact: {}
  description: This is the core REST API for Graph Auth.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: Graph Auth
  version: "1.0"
paths:
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: Accepts an email address and sends a one-time login link valid
        for 15 minutes.
      parameters:
      - description: JSON body with email field
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Confirmation that the email was sent
          schema:
            $ref: '#/definitions/api.RegisterResponse'
        "400":
          description: Missing or invalid email
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Failed to store token or send email
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Register / Request Magic Link
      tags:
      - Auth
  /api/auth/session/consume-code:
    post:
      consumes:
      - application/json
      description: Redeems a valid 6-digit delegation code to provision a new child
        session node in the Neo4j provenance graph. Requested scopes must be limited
        to read and fertile and be a subset of the parent session scopes.
      parameters:
      - description: JSON body containing the 6-digit code, device name, and requested
          scopes
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.ConsumeDelegationCodeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Returns a brand new persistent session token and active scopes
          schema:
            $ref: '#/definitions/api.ConsumeDelegationCodeResponse'
        "400":
          description: Invalid request format or requested scopes are not allowed
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: The code has expired, been used, or is mathematically invalid
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: Parent session was revoked, inactive, lacks fertile scope,
            or requested scopes exceed parent scopes
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Consume Session Invitation Code
      tags:
      - Session Delegation
  /api/auth/session/generate-code:
    post:
      description: Generates a temporary, single-use 6-digit code or URL link from
        an active, fertile session to invite a new device. Requested scopes are chosen
        when the code is consumed.
      parameters:
      - description: Bearer <token> where token is a Session.token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Returns the 6-digit code, direct link, and TTL expiry
          schema:
            $ref: '#/definitions/api.GenerateDelegationCodeResponse'
        "401":
          description: Unauthorized due to missing, invalid, or inactive session
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: Parent session lacks the fertile scope required to delegate
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal failure generating crypto code or saving to cache
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Generate Session Invitation Code
      tags:
      - Session Delegation
  /api/auth/verify:
    post:
      consumes:
      - application/json
      description: Consumes a one-time token from the magic link and returns a session
        token.
      parameters:
      - description: JSON body with token, name, and scopes fields
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.VerifyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Session token and email
          schema:
            $ref: '#/definitions/api.VerifyResponse'
        "400":
          description: Missing token or invalid scopes
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Token expired or invalid
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Failed to create session
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Verify Magic Link Token
      tags:
      - Auth
  /api/clients:
    post:
      consumes:
      - application/json
      description: Creates a new OAuth client owned by the authenticated account.
        Requires the clients scope.
      parameters:
      - description: Bearer <token> where token is a Session.token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Client name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.CreateClientRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Returns the generated client credentials
          schema:
            $ref: '#/definitions/api.CreateClientResponse'
        "400":
          description: Missing or invalid client name
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Unauthorized due to missing or invalid session
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: Session lacks the clients scope
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Failed to create client in the graph
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Create OAuth Client
      tags:
      - Clients
  /api/health:
    get:
      description: Returns the health status of the API
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.HealthResponse'
      summary: Health Check
      tags:
      - System
  /api/oauth/authorize:
    post:
      consumes:
      - application/json
      description: Creates a short-lived authorization code for the authenticated
        user and returns the client redirect URL. Requires a valid session with the
        clients scope excluded from granted OAuth scopes.
      parameters:
      - description: Bearer <token> where token is a Session.token
        in: header
        name: Authorization
        required: true
        type: string
      - description: OAuth2 client and redirect parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.AuthorizeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Returns the callback URL containing the auth code
          schema:
            $ref: '#/definitions/api.AuthorizeResponse'
        "400":
          description: Invalid request or unknown client
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Unauthorized due to missing or invalid session
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: Requested scope exceeds session scopes
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Failed to store authorization code
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Authorize SSO Request
      tags:
      - OAuth2 SSO
  /api/oauth/token:
    post:
      consumes:
      - application/json
      description: Consumes a short-lived authorization code and issues a signed JWT
        access token with a Redis-backed jti nonce for revocation.
      parameters:
      - description: JSON body containing grant_type, code, client_id, and client_secret
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.TokenExchangeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Returns the standard OAuth2 JWT access token payload
          schema:
            $ref: '#/definitions/api.TokenExchangeResponse'
        "400":
          description: Invalid request format or unsupported grant type
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Invalid client credentials or authorization code
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Failed to mint access token
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Exchange Auth Code for JWT
      tags:
      - OAuth2 SSO
swagger: "2.0"
