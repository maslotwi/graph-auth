basePath: /
definitions:
  api.AuthorizeResponse:
    properties:
      message:
        type: string
      next_url:
        type: string
      status:
        example: authenticated
        type: string
    type: object
  api.ConfirmLoginRequest:
    properties:
      client_id:
        type: string
      redirect_uri:
        type: string
      state:
        type: string
    type: object
  api.ConfirmLoginResponse:
    properties:
      redirect_to:
        type: string
      status:
        example: success
        type: string
    type: object
  api.ConsumeDelegationCodeRequest:
    properties:
      code:
        type: string
      device_name:
        type: string
    type: object
  api.ConsumeDelegationCodeResponse:
    properties:
      scopes:
        items:
          type: string
        type: array
      session_token:
        type: string
      status:
        example: authenticated
        type: string
    type: object
  api.ErrorResponse:
    properties:
      error:
        example: invalid_request
        type: string
    type: object
  api.GenerateDelegationCodeRequest:
    properties:
      scopes:
        items:
          type: string
        type: array
    type: object
  api.GenerateDelegationCodeResponse:
    properties:
      code:
        type: string
      expires_in:
        type: integer
      link:
        type: string
    type: object
  api.HealthResponse:
    properties:
      status:
        example: ok
        type: string
    type: object
  api.TokenExchangeRequest:
    properties:
      client_id:
        type: string
      client_secret:
        type: string
      code:
        type: string
    type: object
  api.TokenExchangeResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      scopes:
        items:
          type: string
        type: array
      token_type:
        example: Bearer
        type: string
    type: object
info:
  contact: {}
  description: This is the core REST API for Graph Auth.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: Graph Auth
  version: "1.0"
paths:
  /api/auth/session/consume-code:
    post:
      consumes:
      - application/json
      description: Redeems a valid 6-digit delegation code to provision a new child
        session node in the Neo4j provenance graph.
      parameters:
      - description: JSON body containing the 6-digit code and identifying device
          name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.ConsumeDelegationCodeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Returns a brand new persistent session token and active scopes
          schema:
            $ref: '#/definitions/api.ConsumeDelegationCodeResponse'
        "400":
          description: Invalid request format
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: The code has expired, been used, or is mathematically invalid
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "403":
          description: Graph constraints prevented attachment (e.g. parent session
            was revoked)
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Consume Session Invitation Code
      tags:
      - Session Delegation
  /api/auth/session/generate-code:
    post:
      consumes:
      - application/json
      description: Generates a temporary, single-use 6-digit code or URL link from
        an active session to invite a new device.
      parameters:
      - description: Bearer <token> where token is a Session.token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Desired scopes for the target device
        in: body
        name: body
        schema:
          $ref: '#/definitions/api.GenerateDelegationCodeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Returns the 6-digit code, direct link, and TTL expiry
          schema:
            $ref: '#/definitions/api.GenerateDelegationCodeResponse'
        "401":
          description: Unauthorized due to missing, invalid, or inactive session
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal failure generating crypto code or saving to cache
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Generate Session Invitation Code
      tags:
      - Session Delegation
  /api/health:
    get:
      description: Returns the health status of the API
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.HealthResponse'
      summary: Health Check
      tags:
      - System
  /api/oauth/authorize:
    get:
      description: Evaluates device state. Redirects authenticated devices to a consent
        screen, and unauthenticated devices to the session delegation flow.
      parameters:
      - description: OAuth2 Client ID
        in: query
        name: client_id
        required: true
        type: string
      - description: OAuth2 Redirect URI
        in: query
        name: redirect_uri
        required: true
        type: string
      - description: OAuth2 State string
        in: query
        name: state
        required: true
        type: string
      - description: Existing Neo4j Session Token
        in: header
        name: X-Session-Token
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Returns the status and the next frontend URL to redirect to
          schema:
            $ref: '#/definitions/api.AuthorizeResponse'
        "400":
          description: Missing required OAuth2 parameters
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Authorize SSO Request
      tags:
      - OAuth2 SSO
  /api/oauth/confirm:
    post:
      consumes:
      - application/json
      description: Verifies the active session and generates a temporary, high-entropy
        OAuth2 authorization code.
      parameters:
      - description: Active Neo4j Session Token
        in: header
        name: X-Session-Token
        required: true
        type: string
      - description: JSON body containing client_id, redirect_uri, and state
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.ConfirmLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Returns the callback URL containing the auth code
          schema:
            $ref: '#/definitions/api.ConfirmLoginResponse'
        "400":
          description: Invalid payload
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Session invalid or revoked
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Confirm SSO Login
      tags:
      - OAuth2 SSO
  /api/oauth/token:
    post:
      consumes:
      - application/json
      description: Consumes a short-lived authorization code and issues a signed JWT
        access token backed by Redis.
      parameters:
      - description: JSON body containing code, client_id, and client_secret
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.TokenExchangeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Returns the standard OAuth2 JWT access token payload
          schema:
            $ref: '#/definitions/api.TokenExchangeResponse'
        "400":
          description: Invalid request format
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "401":
          description: Invalid, expired, or already consumed authorization code
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Exchange Auth Code for JWT
      tags:
      - OAuth2 SSO
swagger: "2.0"
